front:
  text: 圭塘欵乃集題詩
  hash: sha256:adbecb37c1ec82e0e0865fab5d6a08db1613af3ef849931f208d0b0dd83a0677
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0078_WYG_004-1a, image: WYG1366/WYG1366-0912c.png}
body:
  text: 至正甲辰諸生書於大都南城之寓館趙恒細讀圭塘唱和詩流風餘韻想當時東山絲竹閒方得北海樽罍老更宜亂後池臺渾索寞夢中松竹亦參差椶輿不晚歸枌社願校園丁闕舊基中書左丞安陽許公洎弟太常文章政事名滿天下每嘗想慕風采至正甲辰愚叨掌故得親太常公一日出示圭塘唱和詩集迺左丞致政太常以南臺御史還家兄弟暇日讌集圭塘亭榭時所作也一唱一和珠玉輝映奉讀之餘則賢人君子棣華之樂可想也遂成俚語一章用贊萬一云陸煥然宰相歸來致政時圭塘唱和類壎篪好山好水天開畫難弟難兄日賦詩酒斚每從花塢設釣舟時傍栁隂移景因人勝千年下緑野香山未足竒
  hash: sha256:3a725d14a0eb3cf5f0b9350b0025620091d5d3f41a703ee05e08534a33e545e5
