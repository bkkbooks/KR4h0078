body:
  text: 圭塘欵乃集巻上元許有壬等撰買陂塘有孚買陂塘旋栽楊栁詩翁急欲知務平生想像江湖意幾度鷄嗚風雨鳬有渚直晚景桑榆才得烟霞嶼先賢好語道鍾鼎山林神仙宰相從昔不同趣西池路天意而今都許佳人協律調吕浮沈願入鷄豚社其奈香山佳句誰我醑又菊節相催先約修花譜猶今視古有洹水秋聲林慮爽氣壯觀我西圃買陂塘旋栽楊栁山中道士家務豐年城市秋偏好又近重陽風雨蘭汎渚雖信美江山不似吾雙嶼孫兒學語説桑梓光隂松筠節操嵗嵗有驩趣沙堤路身退功成天許非熊夢斷占吕但教階下人如謝解道春池新句尊有醑更不説傳家事業光吾譜衣冠尚古有雙檜亭臺萬荷池沼安我邵平圃買陂塘旋栽楊栁平章風月專務歸來温樹無人問但聽四忩荷雨圓作渚准擬似神仙瀛海烟波嶼凭闌獨語笑元亮謀生秫多菊在惟識酒中趣東華路朝士從教推許廟堂議論如吕謝學士序公文過集曰端承乏翰林亦嘗得預廟堂大議公於事有不可輒危言極論畫其後當何如莫道夷簡不曾説来聞者為竦立而今不説經綸話只辦城西聯句隣酒醑更乗興相從香鼎并琴譜平生考古已散却黄金換囘清福倚杖㸔為圃買陂塘旋栽楊栁園亭儘有公務東山更理閒絲竹莫用蒼生霖雨鷗鷺渚澹相對忘機不羨蓬瀛嶼平生願語便泉石膏肓烟霞痼疾始遂隱居趣邯鄲路老我頭顱如許黄粱何日逢呂斜川便是桃源洞千載歸來辭句巾漉醑笑琴亦無絃何處求新譜茫茫萬古任滄海桑田白衣蒼狗不到老農圃買陂塘旋栽楊栁閒人有此忙務平泉緑野吾無羨僅著一蓑烟雨舟泊渚更把釣觀魚宛在池中嶼掀髯自語待月到天心風来水面笑領此時趣堤邊路斸藥隣翁相許阿䝉非復前吕西山如畫花如錦專待公來尋句瓢挹醑聽牧唱樵歌髙下從無譜何須説古只待漏東華軟塵千尺應不到兹圃買陂塘旋栽楊栁佳人屢輟齋務扁舟蕩漾亭深處堪避片雲踈雨明月渚有仙子凌波解佩留芳嶼園丁亦語道四美俱全二難巧遇杯酒易成趣昇平相原與旌陽同許水雲身世希吕歸來却覔𤣥真子不和岳陽樓句斟桂醑悵瑶琴朱絃遺曲誰能譜談今援古聽無底詩囊有源詩派何必種芝圃買坡塘旋栽楊栁不妨三月農務溪翁走報新痕漲昨夜西山雷雨將沒渚有複道雙洲繚繞通孤嶼黄鸝對語正春色暄妍物華明媚好在浴沂趣天涯路芳草茫茫如許蠻牋難寫心吕碧雲冉冉春波緑都是相思情句花共醑似梅與山礬臭味曽同譜堤隂樹古要亂絮漫空柔條醮水慎勿折樊圃買陂塘旋栽楊栁詩人何遜曹務水雲鄉裏看雲錦不羨落花紅雨如顧渚膾鮮鯽銀絲畫舫縈囘嶼花嬌欲語任瀲灧荷觴淋漓宫錦痛飲是佳趣虛閒地更有圖書如許坑灰追笑嬴呂北忩一榻清風細讀罷羲文章句姑置醑對避暑樓臺名畫宣和譜亭前檜古看黛色參天霜皮溜雨閒殺漢隂圃買陂塘旋栽楊栁新来已見成務小山叢桂人如玉何用為雲為雨懐北渚悵𣺌𣺌予懐目斷游龍嶼憑誰寄語正宋玉悲秋桓温種木妨我逺游趣西風勁一鶚横空何許匆匆月又南吕崇臺迥出雲霄表好是登髙題句時載醑却不似香山淚落琵琶譜毋多讓古有黄菊青松寒香晚節吾不負吾圃買陂塘旋栽楊栁英雄頗識時務老臣正欲彰君賜未辦萬間風雨安石渚可無事争墩吾自安吾嶼從人浪語且雪後觀山鐙前飛葢不動剡溪趣西湖夢却要扁舟来許何時命駕如呂對梅渾似蘇堤上追和逋仙佳句茶當醑有佳客相過刻燭論詩譜因評近古自晝錦歸來觀魚軒後誰更問園圃可翁和明初賦摸魚子壽予既次其韻而可行和之成什衰病技癢亦足為十首買陂塘旋栽楊栁歸來先是此務他鄉故里都休校舊雨不如今雨鴻在渚笑爾尚南飛吾已安孤嶼黄花解語道人老宜秋身安耐酒此正有真趣鑾坡路大手深慚燕許超騰又悖鍾吕但求閒澹如元亮却恨詩多竒句傾緑醑底須按樂天池上霓裳譜休論往古有三日重陽約君同醉老子築西圃買陂塘旋栽楊栁閒官宜治閒務老天助我攻清澹兩月不遭泥雨規别渚更累土為山留土分為嶼鄉人共語歎百嵗陻蕪一朝疏鑿此去日成趣江湖願自是平生心許元英誰羨陳吕石渠細溜鳴琴筑清似我家詩句杯引醑便收拾松風寫入絲桐譜區區學古愧竊禄無功投閒有分猶患不如圃買陂塘旋栽楊栁年來於此承務涼臺燠館吾何有聊芘一時風雨洲映渚向一片烟波鼎峙嵯峨嶼盤空硬語挽三峽詞源千軍筆陣不盡樂閒趣當年志為國微軀曽許青雲仍際干吕從知弱步難勝重夢斷九天臚句時飲醑趂四序栽花綴作園池譜長歌弔古悵安得良田茫茫萬頃種玉闢𤣥圃買陂塘旋栽楊栁田園忙勝官務放魚種藕常無暇移竹又當新雨由近渚駕一葉扁舟時復還吾嶼花香鳥語况心上無縈眼前多景絃外有琴趣尊罍小能費人間幾許荷香惟欠仙吕天光雲影清難寫盡日撚鬚無句池作醑要醉上通明傳取鈞天譜西山翠古任列壑争譏攢峰竦誚難及野人圃買陂塘旋栽楊栁塵凡皆與停務半生醉夢人間世翻覆幾囘雲雨歸有渚似真到三山縹緲紅雲嶼忘懐笑語任白鷺驚飛蒼苔不掃去此便無趣斜川路宇宙茫茫何許綺園肯附諸吕悠然一見南山後便覺世多塵句持此醑論心事中間異姓還同譜迂踈好古因蓺菊栽松滋蘭植蕙荒了種瓜圃買陂塘旋栽楊栁散人不理他務栁栽近水應先緑底用等閒霖雨遵北渚㸔雙檜蟠空倒影揺烟嶼千言萬語只今日投簪經年閉户便自得天趣真男子報國誰如張許論交仍負嵇呂我今但要閒陶寫幸免鏤章雕句村甕醑此真是交梨火棗傳家譜庭空樹古有野鸐時来衡門不鎖清徹地仙圃買陂塘旋栽楊栁歸農未免多務一亭四序饒風景且説夜來春雨香濕渚愛新栁依稀敷影連三嶼黄鸝不語怕曲几團蒲坐忘未定驚破静中趣功名事却笑平生自許誰調陽律隂吕而今且向東君問舊句豈如新句開臘醑要醉喚石湖重緝寒梅譜榮枯自古趂九十韶華六旬餘力終日醉吾圃買陂塘旋栽楊栁清風淨掃塵務栁隂已見疎成密又聽緑荷敲雨鷗戲渚奈倐爾飜飛飛過崔嵬嶼形神自語豈世事相縈機心未息物我不同趣池亭小收斂風烟來許漁歌何愧鍾吕水紋瓦影相娛悦髙詠退之佳句荷酌醑有一曲滄浪不犯人間譜悠悠振古問誰似吾儕攻迂習淡為水廢場圃買陂塘旋栽楊栁眼中已辦歸務栁成修榦蓮成實均沐老天恩雨憐小渚敢氣象侵陵海上神仙嶼神仙有語任涓滴蹄涔茫洋鯨浪各自適歸趣星星鬢鏡裏衰容如許西風又動商吕九原宋玉悲何及付與短歌長句瓢泛醑縱不到箕山也是曽通譜希賢信古㸔晝錦堂前霜天老月千載照韓圃買陂塘旋栽楊栁田家小小成務一年清景君須記大勝草烟花雨氷沍渚把一片玻瓈圍䕶瓊瑶嶼鉤簾獨語是天富貧家地輸清供種種出竒趣桑榆樂造物而今已許一竿自昔歸吕圭塘欸乃烟波曲却屬腐儒章句尊有醑是波若神湯世與詩同譜誰能復古且池上觀梅爐中煨芋燈下治書圃明初和并序中執法安陽公初度之辰熙賦樂府為壽以買陂塘旋栽楊栁為首句為新得園池成公志也公洎可行都司各和二首楨和二首既而可行董浚築之役竣事復八賡韻公亦如之愈出而愈竒有本者如是夫公命熙復賡而鼯技窮矣搜枯得九首并倡為十闋謹録以呈伏希指教買陂塘旋栽楊栁參知緑野機務春花秋月冬宜雪夏有芰荷風雨亭北渚更倚棹觀魚時憩東西嶼掀髯自語任黄閣絲綸彤庭劍履未換涉園趣人間世多少髙眠巢許勲庸終愧伊吕得閒宰相方為貴誰識山中詩句觴玉醑㸔老鶴蹁蹮舞入南飛譜清風萬古是舊隱晞韓新堂醉白香滿菊花圃買陂塘旋栽楊栁參知老圃機務宰臣得請歸田里乆旱忽逢甘雨懷鄂渚悵黄鶴樓前鸚鵡翔烟嶼騷魂可語奈信美江山無窮湖海難得故鄉趣西園地天意昔年曽許塤篪近協音吕築臺浚沼方竣事更辦雪兒佳句仍酹醑為禱爾三家恐有治園譜今吾勝古問孟氏芳隣向時康樂何似柬之圃買陂塘旋栽楊栁參知圭沼機務石渠㶁㶁鳴西北不用九天瓢雨魚在渚又戲藻翻荷遶遍方圓嶼魚如解語道惠子忘言莊周忘象豈識水中趣寒泉上雲影天光如許髙談曽會朱吕此中儘有源頭水添我感懷新句姑却醑便合著葉嘉百世雲仍譜心源汲古任眢井無波方塘好在餘潤及蔬圃買陂塘旋栽楊栁參知三島機務方壺圓嶠千夫力揮汗已能成雨鳬立渚看兩兩胎禽俯伏紅雲嶼忘機對語儘較短量長昨非今是未害老仙趣山中計長史詎能羈許糊塗政合晞吕交梨火棗如緘惠何必雲林摛句缾罄醑問玉醴金漿通我仙宗譜嘗聞往古説舟近蓬萊風猶引去何處覓縣圃買陂塘旋栽楊栁參知漁艇機務巨川冒涉風波險此際纜烟維雨朝泊渚到日落蒼波移傍寒梅嶼翠禽無語甚雪意方深月明空載獨棹始成趣鑾坡夢年少紛紛權許科名更欲侔吕桃花浪暖多肥鱖不識緑蓑詞句常載醑豈特與筆床茶竈聯文譜閒忙今古是世上何人淵明日涉董子不窺圃買陂塘旋栽楊栁池亭檢校公務團茅時復羲皇上驚夢每勞忩雨東望渚却不似西偏略彴連雙嶼于時語語待栁色環堤荷香入座方足倚闌趣園丁戅直把廉名自許端如司馬家吕十千䕶得簷前檜莫詠蟄龍竒句誰酌醑試共看東臯五斗先生譜明當倣古要渠列箕疇牖縣羲畫學取晦翁圃買陂塘旋栽楊栁平堤檢校公務近来不用新沙築屐齒要深苔雨蘭藝渚植桂樹團團宛在池中嶼堤應怨語只有恨柔條無情飛絮日與我同趣周垣下杖䇿已䝉神許饐瓜何用懐吕丈夫志不期温飽愧爾碧紗籠句行且醑聽弦索迎風吹入新翻譜由今視古對草綠西湖裙腰一道端合讓西圃買陂塘旋栽楊栁飛橋檢校公務當年題柱非無意借用墨池𤣥雨沱共渚早有路潛通海上三神嶼歸來笑語便玉螮横空金鯢跨海安有野亭趣裴中令别墅相師惟許倡酬聲應鍾吕若教子午成丁夘容得老漁尋句忙喚醑好浄洗窮愁却與論詩譜西風道古我欲繫匏瓜匏瓜何在緱氏已無圃買陂塘旋栽楊栁崇臺檢校公務西山逺獻千巖壑總解蓄雲藏雨臨淺渚更俯視銀濤萬頃揺孤嶼姮娥寄語約静影浮光浴金沉璧方領眺蟾趣登臨地休逸主人先許買隣邀我從吕黄金鑄作千錢賀不及無聲新句㪺緑醑甚欲把園亭草木隨時譜歌豳驗古看祭韭條桑薪樗剥棗納稼築場圃買陂塘旋栽楊栁夢中還理家務十年不到衡山麓孤負楚雲湘雨蘋映渚𣺌杜若江蘺香接烟霞嶼口心相語為蠅驥東西雲龍上下誤却釣游趣生平志願識平輿二許煌煌岳降申吕斐詞敬為先生壽博得月章星句毋我醑只小草幽蘭心醉離騷譜松存徑古待遊遍西園荷鋤歸去吾亦愛吾圃楨和買陂塘旋栽楊栁求田専理農務扁舟来往烟波裏青篛緑蓑風雨時泛渚把逺岫遥岑收拾來孤嶼黄花解語道鳳閣鸞臺黄塵烏帽争似醉鄉趣洹溪上道士而今惟許非熊夢斷姜吕水聲山色相縈繞湧出筆端新句斟桂醑聽萬籟笙竽一派仙家譜休論往古向種菊籬邊觀魚軒外晚節有秋圃買陂塘旋栽楊栁閒人忙過曹務山翁溪友來相賀昨夜應時甘雨舟泛渚有茶竈相從同過東西嶼鷗邊自語是午夢初囘餘酲未解七椀得真趣神仙事雲海茫茫何許何人巖下逢吕詩家却有還丹訣萬景㸃成竒句公自醑且山水徜徉莫考飛升譜悠悠萬古看一片烟霞四時風物吾圃即𤣥圃圭塘雜詠并序有孚圭塘亭臺浚築之役經始及落成有孚實皆與聞吾兄時一來遊雖乗興忘返而芳春長夏秋晴冬燠有孚獨得賞玩竟日不敢孤兄之賜謹取日所為事各成小詩題曰圭塘雜詠用發長者一笑塘之可詠者不止此又當别撰拜呈作樂導水一部香山池上樂等閒誰遣到圭塘水聲更比樂聲好鳴玉潄雲來未央攜妓落成郡守朱舜咨治具率寮友來賀喜甚大醉而歸皂葢朱轓寮友隨池亭終宴不知疲笑扶紅袖山翁醉寧問街頭拍手兒栁下聽鶯隂隂烟翠足潛身其奈嬌喉百囀新却憶當年閶闔曉恩袍光照上林春登第日唱名西宫密邇上林嘗聞鶯也舟中對鷺風標公子雪衣裳來把蓮池野景妝鼓浪嗚橈不驚去主人機事乆相忘荷觴酌酒珍珠紅貯碧琉璃故摘新荷代酒巵㸔取持盈舊時手肯教宫錦笑淋漓蕉葉題詩緑映書忩兩樹蕉興來得句就揮毫何時更草閒居賦却笑街頭紙價髙荷浄納涼晚來池上據胡床荷葉荷花逺益香不待輕風來鼻觀一襟煩暑自清涼開忩㸔雨白雨跳珠響翠荷秋聲剛比夜來多天公不破為霖手捲地狂風可奈何時大旱連日雨作皆被風吹散松隂獨釣滿地松隂草似茵漁竿聊復樂吾真無端凡子忽相過便説嚴灘與渭濵與客泛舟青簾畫舫木蘭橈佳客來游不待招莫話濟川當日事且乗明月聽吹簫日夕觀山晚晴臺上看巉巗萬壑千峰起翠嵐恰似雲間招五老今宵有夢定江南西堤晚眺雲影天光隔小橋一亭如翼水週遭東隅不似西堤好日照平林古塔髙雨中移竹琅玕新緑滿亭臺雨雨風風手自栽玉立明年㸔新筍凌雲會使鳳凰來月下觀梅月照新堤水見沙暗香浮處影横斜詩人同愛多成僻不獨西湖處士家倚檻觀魚魚我相忘樂可知漆園仙老不吾欺眼前無限濠梁興獨咏鄉賢石刻詩魏公有觀魚軒詩石刻遶堤種菊酒熟同招隱士㸔飢來忍把落英餐春風無限閒桃李不似黄花耐嵗寒竹間開逕隂分老翠濕分苔洞府通幽一逕開底用三三煩杖屨此中風月足徘徊水口聽琴潺潺石溜最宜琴悵望佳人勞我心誰識淵明琴外趣只愁流水負知音獨坐投壺小童傳箭侍投壺勝負無争祗自娛四面芙蓉風日美絶勝客舍夜呼盧登臺縱目白雲飛處太行低逺近川原望眼迷西北蒼烟䕶喬木佳城鬱鬱是洹溪調白蓮始花素娥乗月下瑶臺翠羽霓旌次第開宴罷渚宫歸去晚玉杯遺在碧雲堆調木芙蓉不花堤上芙蓉池内蓮要㸔水月鬭清妍雲舒霞巻知何在目斷秋江思黯然調湖石嶄然山立勢巍巍巗岫封苔碧帶緋幸免秦家鞭叱苦從教雲去笑無衣聽筝雁柱參差銀甲輕水亭虛敞助絃聲從知不似南薰譜且向尊前解宿酲可翁和洹溪滚滚源頭活分得支流入小塘怪底凝雲吹不散管絃聲滿水中央作樂導水一斚才空一曲隨胼胝今日頓忘疲年來懐抱須陶寫敢笑長安衆富兒攜妓落成萬條金縷裊長身勾引遷喬語意新休向建章誇百囀陶家門徑有餘春栁下聽鶯禪定聯拳斂素裳豈知船上載紅妝主人有約君毋忽多少魚兒要汝忘舟中對鷺野人飲具謝玻瓈自有天然軟玉巵蕩漾翠濤擎不定有人謀笑縱淋漓荷觴酌酒騷鄉縑楮寓芭蕉翠瑩尤宜運紫毫風致於詩真有助卯君才調况清髙蕉葉題詩栁隂多處着方牀萬柄無塵各有香危坐悠然受清供風聲摵摵更秋涼荷淨納涼霎時清響閙新荷其奈龍公不肯多忩外風光吾不校四郊禾黍定如何開忩看雨半世京華困鼎茵髙風時復夢𤣥真可憐縁木求魚者今日君其問水濵松隂獨釣欵乃聲中動畫橈不煩舟子更相招而今赤壁荒寒裡試問何人有洞簫與客泛舟林慮千仞翠巖巖罨畫工夫在莫嵐徙倚崇臺觀未足紅輪西北月東南日夕觀山小亭何用赤闌橋細栁新荷緑四遭落日胡床更東望碧天如水月輪髙西堤晚眺山人聚景作池臺移得龍孫帶雨栽頃刻雲間晴日上便教隂過酒尊来雨中移竹空明雲水碧揺紗疎影尤宜竹外斜為我殷勤謝傖父莫疑繁李玉川家月下觀梅魚樂江湖自不知非魚非我敢相欺巵言我不如莊惠終日觀魚只有詩倚檻觀魚紛紛紅紫厭相㸔老境才將蔗倒餐不向四隄皆種菊風霜誰與共髙寒遶堤種菊翠寒深處斸蒼苔香霧霏霏晚自開從此一笻雙不借尋詩迎客幾盤徊竹間開徑幽棲長物一張琹時對清流自寫心老子興闌童子去月明縣溜有遺音水口聽琴緑隂清晝矢鳴壺慶馬何煩用酒娛有主無賔聊一笑却呼童僕煮臯盧獨坐投壺老眼常疑萬象低憑髙逺景更凄迷只從此地觀吾圃便覺江湖是小溪登臺縱目仙姿皎潔映圓臺真見凌波恣意開却是圭塘宜産汝朝陽東照玉成堆調白蓮南土風宜陸地蓮移根培植不能妍世間乆絶司花手却道殷韓是偶然調木芙蓉不花一巻千古碧崔嵬閲盡人間紫與緋老子未能兄事汝醉來聊用掛絺衣調湖石氷絃轟烈倚歌輕絃外無聲却有聲我自忘情聊過耳幾人聞此發狂酲聽筝楨和清泉百折來西麓逺逐笙歌匯一塘從此主人多樂事源源如水共無央作樂導水郡寮飛葢逺追隨觴詠臨流肯厭疲一任東山多漢妓夏家元是木腸兒攜妓落成聲似笙簧金滿身飛来應愛栁條新遥知驚破幽人夢才信吾園有好春栁下聽鶯泛舟逃暑謝冠裳愛爾蕭然水國妝一縷風絲忽飛去眼前有句不能忘舟中對鷺軟香誰琢碧玻瓈捧掬兢兢强作巵竟日罰多詩不就墨痕少似酒淋漓荷觴酌酒當年懐素種芭蕉髠却中山幾兎豪偶得青羅游戲耳秋風攀桂仰天髙蕉葉題詩水雲鄉裏一藜床萬緑亭亭晚更香地勝境清煩暑盡更教漁笛弄初涼荷淨納涼紛紛銀箭射新荷添得陂塘景物多囘首林慮真水墨一忩其奈萬山何開忩看雨龍蛇影裏藉莎茵一線清風畫不真眼底得魚鮮可食山巔何似水之濵松隂獨釣忘形談笑任停橈邂逅寧煩折簡招我欲扣舷誰我和吾舟有客却無簫與客泛舟亭西咫尺聳千巖清氣侵凌湧碧嵐紅日欲沈山更好從他捷徑在終南日夕觀山聞説平泉與午橋興衰自與世相遭栁堤雖比沙堤小莫景相從此最髙西堤晚眺踏泥穿徑接崇臺斸破蒼苔特地栽我得此君心事了從今俗客不須来雨中移竹老樹清溪映白沙可人竹外一枝斜黄昏信步前村去香到松林賣酒家月下觀梅濠梁樂意幾人知魚自知魚肯自欺莫説銀絲鮮鯽膾波神應怪杜陵詩倚檻觀魚東籬疇昔笑相看培植今非為夕餐但與此隄同晚節九天霜露任清寒遶堤種菊翠隂穿漏地無苔涼氣疏通一徑開要與此君常接迹杖藜初不厭紆徊竹間開徑琮琤鳴玉已如琴更拂氷絃為洗心我識子期千古意直教流水有餘音水口聽琴消閒偶爾得全壺心手相忘亦可娛忩外山禽忽驚起握籌因得笑胡盧獨坐投壺碧雲冉冉雁行低望斷郊原思欲迷隱隱玉龍飛舞處却知流派是前溪登臺縱目水仙拭面出粧臺渚霧汀烟撥不開愧爾多情慰貧索滿池融作爛銀堆調白蓮橘不逾淮况木蓮爾居非地敢争妍江南八月花如錦却是天機出自然調木芙蓉不花紛紛卉木簇峩巍栁亦拖藍棗亦緋獨爾堅頑無用處只從烟雨老苔衣調湖石弦風清入玉纖輕翻作雲間鸞鳳聲不用捋鬚興感慨且圖醒却一朝酲聽筝酒間得口號卄八字可翁卯君為我鑿圭塘荆棘化為雲水鄉昨夜荷香新雨過一年勞費盡銷忘有孚和檜影蟠空荷滿塘錦鄉還勝五雲鄉須㬰一曲棹歌起四座清風暑亦忘楨和栁隂荷氣滿池塘好景天留在老鄉翁自無心聊復爾誰教魚鳥亦相忘侍飲圭塘賦律詩并和韻二首楨人間何地不驕陽今日池亭願始償四面緑楊籠碧蘚一池翠葢擁紅妝松揺天外風聲細竹引忩間雨氣香莫問為霖蘇大旱醉眠且得一宵涼習池自合醉髙陽酒債從今未易償花白好從陶令社冠金休羨蜀宫妝雨聲瀉出九天譜荷氣鍾成百和香頭上黒雲真有意要催詩句助清涼翁用楨韻二首城西風物擅安陽鄉社而今債已償自笑衣冠成野逸更從花栁看時妝酒沾松露涓涓冷詩入荷風字字香莫道年來無事業等閒成就一天凉半畆方塘學紫陽道心未瑩賞心償蝶飛已悟三生夢蓮褪猶存半面妝四座賔朋連日醉一朝風雨滿城香人間政爾愁炎暑誰信吾亭有許涼叔和楨韻并序至正已丑嵗相城春夏不雨旱既甚六月廿九日始雨入夜霑足吾兄乘㯶輿挈壻姪來圭塘縱觀樂甚猶子楨具饌且有詩兄謂有孚曰詩雖不髙其意可取遂走筆答之有孚亦技癢弗禁依韻得四首兄載賡之楨亦自和共八章觴詠間作於荷聲樹色中不謂此身之在塵世也時東平孟彦超來尹安陽方走神祠致懇禱甘澍適應尤可喜也故并及之水雲身世本純陽入座仍教宿債償且對風光留客飲誰教雪景待人妝芭蕉題字詩偏好荷葉為杯酒亦香却笑紛紛輕薄手等閒翻覆變炎涼階下戎葵識向陽平生心事未全償池邊風雨生秋意林下衣冠稱道妝三徑不荒松菊茂一亭渾貯芰荷香仙翁命駕來聽雨未許北忩專此涼買得園亭位面陽百年心事一時償風吹楊栁囘鸞舞雨浥芙蕖墮馬妝相下未成真率㑹洛中空記姓名香當時太液池邊宴不信人間六月涼辛已之夏吾兄以左轄被命留京師遵故事率留守臣登廣寒殿視罅漏適御酒至恭宴池上有長句故及之炎光咫尺又秋陽生意才將一雨償學圃幽人乘逸興凌波仙子競新妝三生不負林塘夢滿座驚聞翰墨香為語安陽新令尹廛氓先荷此宵涼太常引四首七月十九日賦可翁圭塘種藕已多時貼水曉星稀生意一朝囘便萬柄紅酣緑欹連宵驟雨透空繁響清絶不容詩對景冩襟期要無愧䲭夷子皮幽人早起赴池亭㸔初日照娉婷風葢露珠傾又勝似前時雨聲水沈鄉裏錦雲深處雙檜挿天青一葉釣舟輕似野渡無人自横四堤楊栁接松筠香破水芝新羅襪不生塵笑書裏凌波未真紅雲縹緲清風蕭颯半醉岸烏巾不是葛天民也做得江湖散人雲舒霞巻萬妝濃倒影水天紅池轉小臺東又一種娟娟玉容仙肌綽約竒芬清逺揺動水晶宫一笑對衰翁好同赴廬山社中有孚和藕花無數半開時池上客來稀杖履獨徘徊忽翠葢因風盡欹天工妝景水神輸供陶寫費新詩身外杳難期笑士價才堪五皮緑衣持節擁亭亭玉立萬娉婷一見寸心傾任詩畫無聲有聲新篁揺葆蒼松張葢山色入簾青雲淡午風輕㸔樹影西忩又横水文湘簟織霜筠座客句清新何物是紅塵更着個漁舟寫真趙公琴鶴謝家絲竹漉酒又陶巾不獨太平民好鳳閣鸞坡舊人靚妝仙子謝纖穠獨立水雲紅綽約畫闌東似姑射氷肌雪容翠盤承月玉杯擎露粲粲蕊珠宫真賞有隣翁盡添入霓裳曲中楨和池亭荷浄納涼時四面栁依稀棹得酒船囘看風裏紗巾半欹殘霞照水夕陽明樹天付畫中詩應不負歸期更誰㸔桃花面皮西池池上好新亭紅翠鬭娉婷翠葢幾番傾聽水上紅妝笑聲歸來鄉社不闗塵事活計問樵青世事一毫輕看西嶺秦雲暮横藕花香裏有叢筠照水緑梢新清潔出風塵似特與幽人寫真門無俗客地多清興羽扇白綸巾甘作太平民敢自謂羲皇上人淡妝素服更纎穠清致不須紅佇自書橋東一掃盡人間冶容麻姑何在嫦娥昨夜飛出廣寒宫天亦為詩翁把好景都移此中圭塘獨坐賦四律可翁我作圭塘未及年眼中生意浩無邊三秋未半荷沃若一日不來心欿然自古人生求適意只今先務是歸田管絃何似塤篪韻此去新詩幾百篇西郭園亭近市㕓市㕓雖近足風烟陶家事業惟栽栁周子襟懐託愛蓮莫向人間為白眼試從水面照華顛悠悠千古滄浪意時上扁舟自扣舷我屋來西圃輪蹄二里遥晚風收菡萏秋雨長芭蕉有酒容開口無官免折腰柴門莫緊閉恐負野人招地僻心逾逺詩多意轉長隂森穿竹徑甘脆剥蓮房魚長已堪釣醅香先自嘗敢言誇晝錦聊復此圭塘有孚和天與安閒未老年杖藜無日不池邊古存兩檜待真賞瑞毓雙蓮非偶然但要遶籬皆有菊從教負郭却無田和陶未盡登臨興更誦南華内外篇池上新亭僅一㕓池中風物飽雲烟底須太華峰頭藕且對匡廬山下蓮飲酒有時如白醉揮毫無用效張顛扁舟盡日横秋水客至何因瞑戛舷小酌西堤上松隂曲徑遥竹金揺翡翠杯玉碾芭蕉雨急添池面舟閒纜樹腰嬾書無折簡佳客不須招林泉風景别山色與雲長酒友招元亮仙游憶子房鱠鮮銀細縷粳熟雪初嘗自愧無佳句其如負此塘楨和一束辛勤四十年神功收斂老溪邊髙牙大纛皆闕爾野服黄冠任自然但得酲心多勝槩肯因餬口望良田圭塘此去無他事與客日談秋水篇甘作村氓受一㕓林塘花竹隔人烟四圍水色涵秋色一片紅蓮間白蓮倦矣且歸從所好老来雖醉不成顛採菱有曲聲清越不覺頻敲畫舫舷日涉宜成趣行行不憚遥世塗紆百折心事付三蕉日射花明臉風來栁折腰水雲深處好舟子又相招事去心猶在閒來日更長願治韓相圃誰羡贊公房蕭散今方得艱難昔備嘗天公知此意返照媚横塘漫書可翁誰謂予多蹇年來儘遂心作池通活水栽竹植連隂景物源源出門墉步步深從知非大隱有此小山林有孚和生意觀池上天其慰我心瑞蓮開並蔕新栁作繁隂題品詩方進栽培嵗未深當年朝市夢曽到此雲林楨和搆築非觀美幽棲要賞心芰荷宜晚色松竹共清隂風物四時好烟波幾許深白蓮開爛熳誰復憶東林有舟可翁有舟維老樹欲動恐傷蓮遂使成虛器何由濟大川錦雲香捧擁烟月澹流連泛泛行無礙霜清八月天有孚和憶昨為舟日初非為采蓮衣冠懐赤壁泉石問伊川涉險平生屢投閒幾月連浮生身世似行止敢違天楨和畫舫將焉用圭塘為看蓮不教横野渡且免涉長川荷礙行還止萍開斷復連乘槎如有路相伴去朝天大雨兩晝夜僮報墻仆而竹甚茂喜成口號可翁一夜銀河瀉欲乾桑田幾似海漫漫岸頽墻仆吾無憾栽活蒼筤數百竿有孚和水溢仍須慮旱乾此君生意始澶漫朝來喜造菁菁徑其奈平原水數竿楨和逐婦鳴鳩呌欲乾雨聲長夜共漫漫已添方沼水三尺洗出穿雲玉萬竿雨後觀竹乃有陻墊摧折者數叢因用前韻可翁憶昨移栽怕雨乾豈期平地水瀰漫此君於我真無負摧折猶堪作釣竿有孚和后土泥深苦未乾幽人無寐夜漫漫此君摧折真堪惜賴有紅霓尚可竿楨和從來植物怕枯乾平地誰教水盡漫叢篠巖墻偶然耳釣鰲吾自有長竿新秋即事可翁莫踏蒼苔破茨門晝亦闗林風秋入樹波日晚揺山原野蒼茫外烟霏指顧間更須安一榻月夜不須還有孚和池亭殘暑去樂事日相闗徑列霜前菊忩招雨後山好詩來枕上爽氣滿人間極目崇臺晚遥天一鶴還楨和西園無俗客盡日掩柴闗栁岸行觀水松忩卧看山功名付身外天地寄杯間目送行雲去翩翩倦鳥還秋隂可翁秋隂宜沼上蘚翠不曽乾聽雨朝欹枕觀雲莫倚闌地寛人自在松茂竹平安天遂閒中樂年豐酒不難有孚和雨上雲猶密尊空硯不乾郊原誰植杖臺榭我凭闌景以人増勝閒知夢益安賦詩因調笑倚和羨才難楨和水面波紋定堤傍土脈乾清風雙鼓棹薄暮一凭闌緑野思裴度東山訪謝安及辰行樂爾世路任艱難漁家傲四首歌圭塘四時也可翁冰盡泉香雲縹緲韶華隱隱浮林杪酒在葫蘆魚在沼清晝悄好音時復來黄鳥管領風光心未老衰顔却怕清波照有酒可斟魚可釣能事了東風一曲漁家傲窻影修篁揺翠葆墻隂幽徑連芳草驀地雨來荷葉閙香更好亂烟浮動紅雲島穉桞千條絲嫋嫋栁邊宜著蘭舟小世態紛紛何足校收桂棹烏烏且和漁家傲露洗璇穹青杳杳年光紅入灘頭蓼翠葢撐烟吹半倒霜信早一匳寒影磨清曉早是軒扉塵不到好山更與供登眺酒債漸多詩債少翻水調西風幾疊漁家傲落日崇䑓寒力峭登臨恰似尋安道有竹何人能徑造吾不誚相逢要遂掀髯笑雙檜凌空龍夭矯有知定訝人枯槁珍重嵗寒氷雪操君自寳老夫且唱漁家傲有孚和莫訝圭塘春縹緲要知生意從冬杪栁動長堤氷泮沼庭院悄舊巢又見來𤣥鳥九十韶華容易老鏡中勲業慚頻照招飲便須忙罷釣休醉了東君要聴漁家傲濃緑園林光莫葆詩翁只愛窻前草驟雨才過蝸乂閙亭館好日長人在蓬萊島風度新松聲嫋嫋酒酣却笑瀛洲小栁外荷邊休計較皆可棹採蓮人和漁家傲雲外賔鴻聲漸杳羈人聴罷如嘗蓼我對清尊時復倒風露早黄鷄果是能催曉蓮褪殘紅凉乍到水天一色供遊眺短笛悲秋知者少吹别調新翻商意漁家傲雪後西山崖壁峭竒觀難與他人道煨芋有爐無客造從壑誚巡簷且索梅花笑冷蕊疎花開矯矯水村妝㸃霜林槁頼有此君同節操成二寳淺斟低唱漁家傲楨和青入西山烟𣺌𣺌天機只在菰蒲杪風解氷澌融小沼人静悄一聲何處啼山鳥杖䇿尋芳逢野老草芽栁眼明殘照歸到圭塘還獨釣心事了簫聲暖和漁家傲衆緑初生如羽葆池光揺漾連汀草紅杏已無春意閙風致好水中三嶼如三島荷葉如錢蒲嫋嫋石渠静聼泉聲小從此圭塘時檢校停短棹栁隂髙唱漁家傲鴻雁翩翩雲路杳蘆花如雪迷紅蓼荷花不禁風雨倒秋意早詩懐清似霜天曉獨掩柴扉誰得到髙䑓日暮宜瞻眺清致日多塵事少歌古調新聲移入漁家傲萬木凋零巖壑峭一機消長觀天道松竹園亭時一造誰敢誚敲氷煮茗供談笑自負平生心矯矯三閭何事形容槁琴到無弦誰與操懐我寳相逢且賦漁家傲瑞蓮歌并序有孚圭塘落成之明年七月既望吾兄中丞公與客小集塘西南雙洲前産瑞蓮駢花亭亭異蔕同跗殆隂陽和氣鍾為禎祥天以慰老臣錫眉壽而昌子孫也惟公髙科起家致位丞弼贊化機培善類三十年矣謝事來歸田不足供伏臘而林塘栽植竭力資之葢欲静觀四時生意之妙與造物者遊而積善餘慶吉事有祥嘉瑞之見理亦宜哉有司欲以上聞公退然不居而好事者繪為圖矣有孚退而閲史唐開元至宋紹興四百年間僅闕十七八見表箋歌頌逢涌沓作雖不奏祥瑞乃公素心然游泳至和詠歌太平不可無也乃為之歌曰圭塘活水分清洹主人嗜好同先賢蓮根培植未逾嵗孰謂一旦生嘉蓮初疑霞臉影附鑑又似綘幘丫分鬈幻成彩鳳翼自比琢開香玉環仍連李唐以來具圖表趙宋奏賀尤駢闐我元聖徳極涵育瑞應只許書有年嘗思至正辛巳夏吾兄實握綱轄權廣寒殿下太液池亭亭並蔕薰風前守臣有請願馳獻獨以義折煩便便歸來對此蹄涔水肯將異卉誇里㕓吾鄉自昔號多士諸君巨筆如修椽僉言此是閭里榮歌詩倐與圖俱傳身閒意適物闕寓園林何必皆平泉天公端為表餘慶慶緒日與絲綿綿蓮房有子風味好不待食藕沈痾痊願言七澤均此瑞主人福壽方如川可翁和相攸西郭濵吾洹老病宜退非遺賢平生竊慕君子德池上種竹池中蓮蓮兮何獨出竒異聯房蕊簇金絲鬈二姝同體面目别七澤移種根株連書祥史籍見歴歴走觀士女來闐闐人言培植乆方盛一泓疏鑿未及年自知不作駭俗事兹焉誰握生發權形容敢勝周子説胚腪又在太極前亭亭照影欲輕舉凌波微步俱清便倦游夢不到玉井歸來老屋安一㕓小池偶爾薙蕪穢池上敝亭才數椽酒從隣貰已多債詩取意適誰令傳天公特與慰岑寂嘉瑞湧出如源泉夘君有唱阿買和僮歌况復清且綿擬為表頌僭歸美奈此嬾痼誰能痊予心真樂更多有傍花隨栁在前川楨和太行山下溪名洹洹溪主人今得賢石渠分溜入方沼種出萬柄紅白蓮就中一茄發挺特艷粧雙出雲髻鬈有如二女降媯汭翠裙紅袖相牽連岐分駭目未信宿里傳闕耳何喧闐波神有為獻嘉瑞要並太史書豐年主人謙德不敢有福善自是天行權亭亭植立萬花表可人適在亭之前日酣欲語轉嬌姹風動似舞尤輕便一時圖寫溢紈素十日車馬空市㕓昔聞蓂莢曽表異乃因土階與采椽景星鳳鳥豈常有考信前史真宜傳醴湖蕪塞不復見而今乃濯圭塘泉禎祥奕葉定不斷藕絲萬縷相纒綿幽人到此自怡悦膏肓泉石尤難痊要須紀録入郡乗千年増重吾山川侍兄池上對景書懐閏七月二日有孚天機寒燠自潛通殘暑何勞用力攻萬柄荷聲秋雨裏一忩山色夕陽中初心人未慚青史晚節兄當訪赤松嵗月等閒成老大池亭何幸日從公可翁和􅘑船時泛一橋通詩壘誰能四面攻官業向來慚柱下仙游隨處是壺中風聲細細來雙檜波影澄澄見七松笑傲滄洲人老矣功名付與黑頭公楨和平生心事負清通得失何須較面攻人道神仙游海上天教宰相住山中四方舊植多桃李三徑新開滿菊松野老從教争席坐不須牀下拜龎公睡起偶成二絶有孚清風枕簟水雲鄉夢覺槐根百慮忘起課山童笑多事飼魚跟藕摘蓮房松竹平堤飯後行眼前幽事總闗情忘機魚亦如鷗鷺能識溪童扣檻聲可翁和衰病天教逺帝鄉君恩一飯詎能忘但愁今日人輕議世有赤松無子房舍則宜藏用則行聖人於世豈無情强顔欲鼓齊門瑟何似圭塘欵乃聲楨和乞得西園作醉鄉浮生俗務總相忘水雲清徹荷香裏小艇虛明似洞房賦詩舒嘯杖藜行水色山光不世情醉卧午忩誰喚醒栁隂啼鳥兩三聲即事有孚理檻存茶竈維舟過酒缸水光浮北棟花影在西忩行樂時休失髙飛氣未降相看終不厭庭檜拂雲雙可翁和秫田秋半熟香入小磁缸霜水清浮簟烟嵐翠可忩酒添詩癖重茶戰睡魔降笑問登山屐吾生費幾雙楨和映水花明樹浮香酒滿缸上書辭北闕寄傲倚南忩處世心無慊論文敵已降圭塘有溪友國士任無雙圭塘雨後督修堰歸坐嘉蓮亭有感十一日有孚睠此三洲水功輸一嵗勤隂留西圃樹清度北溪雲花竹環隄上亭臺錯水濆每勞賔載酒時與客論文值雨天相戲修防事又殷潢流誰紀極岸塌我厓垠水底升船子泥中出此君庀徒紛畚鍤竣事幾朝曛汲汲同援溺憧憧劇拯焚感時空付恨對酒豈圖醺輕薄雲中手艱難鏡裏勲學方知有道境已入無聞覔句期靈運攻書擬右軍杖從鄉老植席許野人分調燮功攸屬浮沈意不羣歸來理緗帙剔蠧拾香芸可翁和嬾是平生癖歸田始克勤灌園時汲井學稼曉耕雲忩取山千疊舟巡沼四濆倦游當税駕勇退免移文誰識予心樂都忘俗務殷圭塘清見底銀海浩無垠潦倒惟營口迂疎愧致君天開方外境塵見隙中曛酒欲連宵飲膏須繼晷焚讀書嗟坐廢娛老却宜醺園綺知髙祖巢由負放勲至人先大節餘事及多聞詩少慚工部鞋多笑領軍郊原諏嵗計風露逼秋分且曳泥中尾休空冀北羣崇臺還一上萬物正芸芸楨和山人新學圃要慰一生勤方沼瀦清水平田種白雲紅蓮迷水面青草亂溪濆有客須沽酒無錢每鬻文山中縁已定池上事徒殷小艇通三島新詩動八垠輕風宜桂棹鳴溜合桐君浄室凝爐篆斜忩映隙曛荷杯方適用芰製莫輕焚欲發詩書韞仍須麴蘖醺儘修閒事業休論舊功勲流水心無競蠅聲耳不聞迹追裴相國詩擬鮑參軍天宇雲無礙溪橋路細分寒梅在花部野鶴暫雞羣萬巻書無恙收藏更種芸鄉友具宴漫成十三日有孚樂意相闗好鳥鳴可憐歌舞漫多情日斜山氣如雲氣風急松聲似雨聲落魄不違鄉社飲棲遲須結嵗寒盟圭塘活水清如許不獨滄浪好濯纓可翁和相望不隔一牛鳴尊俎過從見至情荷露清涵芳酒氣松雲寒遏艷歌聲髙車駟馬初無意白酒黄雞舊有盟醉脱烏紗從露頂絶勝前日縛塵纓楨和不平常欲以詩鳴詩友還能識此情一座笑談皆有道滿前圖畫豈無聲雞豚已遂聯鄉社鷗鷺何妨締舊盟却笑終軍苦多事不攻經籍請長纓侍兄赴圭塘有孚時出西門履信坊望中楊栁是圭塘軒車每被兒童識風物能令杖履忙山客荷囊多草藥溪人抄紙滿隣墻年來頗識幽棲樂愈覺林泉興味長可翁和卜築何如履道坊千紅萬緑浸銀塘要囘衰境為全盛却使閒人號最忙活水清圍容膝屋新篁髙出及肩墻烟霞遮斷塵埃路才覺山林白晝長楨和清晨走馬碧雞坊㸃檢西園數畆塘花栁前川成自樂輪蹄終日為誰忙釣魚岸口迎新水沽酒鄰家過短墻半醉莫催翁命駕月明松影引杯長嘉蓮亭宴罷奉陪泛舟夜分始歸賦詩三十韻是日之宴渤海縣尹吳安之以使來具也閏七月二十一日有孚池亭秩芳筵落日船始放晴空散餘霞秋水淨氛坱髙荷雖離披尚爾緑彌望搴豁成璧池不礙雙槳盪縈紆湛澄碧天宇益虚曠石竇來驚湍松隄俯新漲鼎立洲嶼連沿洄時一傍飣餖羅珍羞傾倒出竒釀侑以二名姬朱絃倚清唱凝雲響空翠幽禽或翓􅀈所愧杯行遲負此百川量須㬰羣動息露氣白沆碭洒然毛骨輕不獨情緒暢燈火空䝉中仿象江湖上陋彼西園游飛葢何冗長云胡渼陂行亦復怯風浪而我方扣舷馮虛恣揺蕩吾兄嚴鄭流髙節張邴亢少飲如醉翁浮此齋畫舫頗恨交游稀毎毎折輩行遂令子弟間日侍屨與杖樓船憶當年樂事炊一餉望洋失所操伏櫪今在鞅静言校疇昔所得多所喪與從天上人何似山中相但恐時易失俯仰異欣悵銀漢淺且清神槎喜無恙人生貴適意前修語非妄榜人報更闌列宿光蕩漾故舊東海頭何當剡溪訪可翁和膠榮四十年弛擔甫天放雖云在人境心逺絶塵坱况兹游騁地秋色入四望卉木已向榮雲水自相盪忩虚得山多臺髙知野曠清泉來汨汨節制無暴漲何須過前川園有花可傍玉肪薦肥羜銀瀣注新釀時貴孺子歌底用小海唱龜魚共游泳鷗鷺來翓􅀈并介亦何常小大各有量子房屈圯下髙祖隱芒碭君臣倐際遇功業驚洽暢挺然三杰中奮乎百世上一朝事辟穀身外物皆長乾坤任俯仰形骸貴放浪萬事雲悠悠一笑天蕩蕩鶚謝累百薦龍戒上九亢人生幾兩屐芒屩乃兩舫徒令方寸心戚戚復行行吾年今如此出入必扶杖故人念衰老千里牲酒餉自鼓烟波枻永税塵俗鞅境勝夢俱清位失道未喪誰言管城子初非食肉相興來使陶寫形容豁惆悵苦吟尚作祟樂飲不為恙學易免大過勿藥喜无妄厭厭詎可極明河月溶漾庶足充淹留何如李公訪楨和謝事居山林居隱言不放幕天豁蒼蒼席地從坱坱魁然保身哲肯作延頸望舟從范蠡遊誰復求奡盪酬歡酒有時度德官無曠方沼維莫秋清波縮寒漲菰蒲相媚嫵魚鳥自依傍溪友薦新鯽長須沽村釀時聞塤篪鳴三嘆應一唱賔鴻方呌羣歸燕尚翓􅀈有此家山樂不較江海量朝來試柱笏爽氣亦何碭清供既已多幽情自足暢雖居城市間宛在羲皇上禮法貴真率服食戒侈長平生事直道所遇非孟浪風景晚舒徐郊野寒莽蕩里氓新相知知我匪蹇亢清風動緑漪明月滿歌舫竹為君子交梅作丈人行圭塘策枯籐不用錫几杖散步遵微行晚食謝餽餉水濵暫彌楫沙頭時棹鞅險語從鬼泣斯文未天喪遥遥東山遊復見風流相千仭立巉巖衆目駭怊悵清泉與白石膏肓特微恙蹤跡諧四休思慮絶諸妄洗耳就潺湲拭目明滉漾西山景更多佳處時一訪圭塘欵乃集巻上
