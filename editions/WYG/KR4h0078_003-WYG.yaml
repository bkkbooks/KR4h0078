body:
  text: 圭塘欵乃集跋相為中原名郡自昔多達官貴人之居宋廬陵歐陽子為丞相韓魏公作晝錦堂記人到於今稱之由魏公而下雖懷黃曳組世不乏人求官簿問望政事文章一切烜赫於時功成身退又能歸享太平之樂者則亦寥寥如也御史中丞安陽許公以經術起身致位尊顯卓為一代名臣晚歸相城視聽不衰闢園作室引流種樹日置酒賦詩為娱樂清風雅致照映後先歐陽記所謂少擢髙科仕宦至將相富貴歸故鄉築堂營圃作詩以遺相人一一皆似為公言者始知魏公之後繼其美者未必無其人也然則圭塘晝錦之名當相為不朽於相矣若夫公製作之妙天下人人知所矜式舊矣是集又若老將用兵百戰百勝而從横變合無不如意顧區區者何足以窺其營壘也哉學生汴段天祐再拜跋安陽公以道徳文章名重一世及功成身退相羊雲水之間與松竹居魚鳥游暨其弟若子更唱迭和金石相宣若身在六合之外逴乎不與世接其賢過於人逺矣哉公於溥為父執都司君長溥年事之若兄國子楨少溥年接之若弟往者嘗拜公於堂侍都司君於客次揖國子楨於大門之外未嘗不僂傴側辟俯而服仰而歎也圭塘康氏之廢園也當其廢時過者不視牛羊萃焉庸詎知今日之遇乎鑿之薙之築之樹之挈子弟而招佳賓圭塘遇矣庸詎知後世之傳乎非公則圭塘不遇圭塘之傳則有頼於欵乃也與至正庚寅孟冬望後二日晚進龍門周溥頓首再拜謹跋唐國子司業楊侯以年滿七十白丞相去歸其鄉朝之公卿士庶共稱其賢昌黎韓子有文以傳於世世以為美談御史中丞相臺許公以年老亦白大夫而去當太行之麓洹溪之濵得地數十畝築亭鑿池深廣有度樹以松竹杞梓種以菱芡夫渠水緑掩映雖極人力每雲收雨止層巒獻翠活水分清儼若天鍾其秀公率子弟或舟楫或杖屨蕩颺乎清流徙倚乎亭之左右更相唱和殆無虛日有欵乃一集鳴於時不知楊侯之去有是樂否今世士大夫宦逰中外老歸於鄉者有之矣得山川之勝而燕㳺者則鮮也得山川之勝而燕㳺者有之矣弟若子俱能文辭者則鮮也公以明經擢上第致位廊廟佐天子出政令幾三十年膏澤被於民物者固多諸福之美萃於一門天之施於公也實厚相之人凡出處去就一以鄉先生為法是集之鳴也益著衆所謂賢者又不得専美於昔矣至正辛卯冬至前五日諸生哈喇岱再拜山川景物因人而勝因文章而傳人品既髙文足範後山川景物之得所託而傳於久逺也可必矣中執法安陽公歸鄉里作圭塘位置之巧泉石之勝松竹荷栁之繁亭臺橋舫之具西山如畫公於良辰美景挈子弟招賔朋觴咏其中宛然香山池上也觀物賦詩殆無虚日積久成巨集圭塘之勝遂聞四方製作之精人願矜式不然則圭塘雖美孰能盡知至正庚寅夏文昇過相州獲拜公於里第陪杖屨一遊來京師日奔走思昔陪侍恍若夢寐癸巳莫春至鯨川訪尚書積素成先生邂逅洹濵御史於餘清軒中適二公對方冊談論驩洽文昇從傍竊觀則圭塘唱和集也思得掛名集末豈不榮幸遂領歸旅邸而手鈔之自不愧其字畫之荒惡也謹以歸於洹濵為後游張本云孟夏天台丁文昇拜書衛之詩有咏歌夫碩人之寛而著於國風者考槃是也有以父子兄弟一家而皆善於詩者三曹是也然而考槃之樂美矣徒託諸他人之咏而見三曹之詩多矣而其私情中紛嫌隙相逼不能以盡夫忠厚和平之樂是皆得於天者或不足於人有其文者或不足於實於是而知中丞公兄弟子姪圭塘唱和之章從容怡愉之思盖古今所僅見者也中丞公世家相州相州衛地而三曹之舊都也中丞公與其弟都司君皆以蚤擢髙科仕宦中外未甞少休於家所謂園林池榭之勝優㳺野服之樂徒形諸懷想而寄諸𣺌茫一旦兄弟同得以遂其情焉則其同氣相親同徳相與發諸歌詩詞韻之間自將宫商相宣金石相和大篇短咏交唱迭和有不能已矣然則衛地之詩此非尤備尤善於前人乎雖然發言為詩聲之和也兄弟既翕家之和也以和兆和將見如歐陽公所謂園間之草木有駢枝而連理禽鳥之翔集者不爭巢而棲不擇予而哺豈特可稱於髙陽許氏之東園哉臨川黄冔敬書昔宋張文定公齊賢舉進士仕太宗朝不十年拜相致政歸洛陽得裴度午橋莊鑿渠通流栽花植竹日與故舊乘小輿攜觴遊釣甞賦詩曰午橋今得晉公廬水竹烟花興有餘師亮白頭心已足四登五府九尚書今觀御史中丞安陽許公謝事歸以賜金得康氏廢園於相城之西刳闢杇壤翦焚榛薉凉臺燠館古木詭石間厠隠顯復鑿池如桓圭形號曰圭塘公野服蕭散乗椶輿時與畸人静者偕其弟若子觴詠其間攄幽發粹更唱迭和金石鏘鳴累巨帙題曰圭塘欵乃公之弟可行時為南行臺監察御史與公皆以名進士顯宦中朝清節雅望輝映後先子楨復以門功起太祝供奉玉堂其懸車之樂視文定公宜不多讓而風流文采萃於一門盖有文定公所不能及者謹拜手題巻末識歎慕之私云諸生鎮陽張守正右中執法安陽許公欵乃集一帙觀其所載園池之勝逰賞之樂無非所以形容太平之風致至於更唱迭和金石相奏而律吕相宣乃與其弟太常君洎子楨供奉出於一門昆季之賢并羣從之才俊有非他人之所與明時國家人才之衆多教化之隆洽因是而可以槩觀焉金臺王翰謹跋至正癸卯余奉使嶺南丙午自瓊儋回届相時太常禮儀院使許公可行奉㫖來尹相省故園之樂也余亦忝列兵曹得陪許公於斯一日得閲公曩侍兄集賢大學士可用公洎姪元榦賡唱圭塘集嗟夫人家孰不願一門父子兄弟忠孝之全徳學之備榮宦之隆哉造物有所僅吝亦人積善未周弗脗於時矣若斯數者許門之樂全矣嗚呼公今之來松楸恪恭田園得意復繕圭塘修榮叢桂對西山而酬興臨清流而賦詩相知棲鳥適趨芳徑䇿杖從容且歌且樂軋圭塘之舊發潛徳起幽光遂平生之髙志樂好景黄花若韓魏公胡子山王西溪各賢不獨専美於往而許公一門躡髙風於後誠不多讓矣若夫麟閣勛名玉堂舊業公無夢矣余何人哉得宻邇於圭塘耕耘也耶浚儀王國寳拜圭塘欵乃集跋右倡和集一帙江湖友人躬録而装潢者二十八年矣南歸展讀中雖無恙而外皆破碎可憐况兵後所存唯此本爾乃力疾補葺遺我子孫永收翫上章涒灘歳夏四月初吉洹濱識
