body:
  text: 圭塘欵乃集卷下元許有壬等撰偕故人趙寬齋胡安禮奉陪泛舟八月七日有孚錦幔髙張綵纜收畫橈徐動浪花浮招呼版築霑餘酌時方版築舟過其下輒遍飲役者收拾綸竿作爛遊垂栁如雲藏一島小橋成徑接雙洲洞簫休品江南曲風月難忘赤壁秋可翁和駭浪船歸百技收回頭人海自沉浮幽間時作蕩舟劇疏懶猶能與客遊紅蓼白蘋鷗鷺國清風明月鳳麟洲諸君更約源源會不泛黃花不算秋楨和碧天如幕晚霞收觴詠從容勝拍浮去嵗已為亭下飲今朝宛在水中遊玉杯酒映紅雲島宫錦袍明白鷺洲更看波光涵月影人間咫尺是中秋雨霽泠然臺觀山十三日有孚連朝雨云虐今日山却好走馬向圭塘忘餐事幽討拾級崇臺雲散䇿芳徑草嶄巖太行巔隱約林慮道巘岫紛獻竒髙低翠如掃平生頗樂山肯信玄髮縞開襟納浮嵐俯檻看飛鳥不有泠然臺孰覺趙魏小可翁和輕風水無波落日景逾好馮虗思橫生萬象困搜討窮睇眼未花得意詩不草勿謂城郭近下有往來道心逺地自偏興來無灑掃收藏千鈞弩莫用穿魯縞悠悠嘆浮雲翩翩羡歸鳥一任坐井徒譁然説天小楨和秋容在新晴風物事事好山色可攬掬詩料助探討西風響疏林晚煙接衰草前溪有小舟何處訪安道蒼苔淨可坐落葉從不掃松下鶴昂藏裳玄復衣縞西山列畫圖圭塘富魚鳥願進一簣功直使衆山小記塘上草木二十四首有孚雙檜如雙虬天賦形天矯蟠根九泉底挺秀重雲表昨夜聞風雷走視寧待曉慎勿變化去須君鎮吾沼七松何山來亭亭此焉萃託根在林塘實與泉脈會人生無百年撫倚成永慨珍重明堂材我但觀偃蓋曲徑通池亭有此一隄竹瑣碎影搖金瑽琤聲振玉髙歌淇澳詩宛若淇園緑君其亟走鞭主人厭粱肉亭前四梅樹來自江之南易地不易性培植吾所甘調鼎本無心僵木何用慚且圖慰幽獨松筠成友三何年植此柏嘉與雙檜鄰霜雪助孤徑雲煙護輪囷葉香來彩鳳影曲驚潛鱗服食吾不暇嵗晚見天真文楸如青幢隂覆釣磯濕又如紫蓋懸髙花間紅碧持竿憩其下烈日爾吾羃猶勝析為枰飽食事博奕屋角有老杏枯枝若枯槎春風一披拂蓓蕾團丹砂董園欲種德花落不用嗟尚憶曲江宴我園同此花婆娑合昏木枝葉方敷榮卷舒爾無爽栽培吾有情紅蕤間層緑團欒若繁纓未能傳嘉樹且飾鳴珂行老樹凍留根生意今始穿薰風能作花猩紅目為眩結實尤可人纍纍采色絢好是無車馬清徹安石院朝陽香霧裏風清露未晞佇立若凝思鬱金捲仙衣對之不敢褻冠佩淡忘歸何以明髙潔圭塘竹日暉粲粲白玉簪墮自天仙髻幻作竒絶花清香偶蘭蕙蛻形氷雪窟脫身脂粉磑云胡不自持終焉芼薑桂芭蕉葉可愛移根神麕阿題品待詩客未許僧占多莖絲真適用花異奈俗何幽人亦分緑用寫考槃歌雞冠子甚微造物巧成就植立意欲騰怒長勢如鬭軒昂自避羣尸鄉莫吾購永懷鈞天庭絳幘唱壺漏環池有異莧紅壓珊瑚樹亦有間鵝黃絢爛五色具蔬品爾最微點綴秋獨富但恐西風髙萎爾在霜露西蜀神仙花住此圭塘上春深風日暄睡足錦圍帳佳人在空谷詩翁有藜杖不須秉燭觀吾方稅塵鞅叢條宛如荆作花蠟為胎茅簷曝冬日亦復凌寒開偶以臭味似冒名百花魁緑葉夏可薦寒泉時一杯郭西雪一株王郎為移枿月明小院春生意孰可遏粉香花漸衰紅消實堪掇繞樹笑文園何由更言渴青蔥環階草花發始知萱芳莛挺孤秀煌煌勢如鶱鳳兮何德衰比擬或失言主人酌酒罷嬉笑弄諸孫園丁笑粗俗勝地乃栽桃紅霞倐如雨作實償吾勞化工有深意盛時隨所遭易落還易長吁嗟吾二毛西隄有穠李照夜雪千堆縞裙垂練帨宛若盧家來笑哦韓蘇詩恥我筵前罍醉後挂冠卧花神莫吾咍種菊繞圭塘花發秋欲莫零露沾壺尊清香隨杖履我非隱逸人却與花有素行看根入池化作甘谷注明忩臨晉帖馳伻覔來禽栽培日以茂用比雙南金但看花實時粲若錦繡林鳥食吾不惜毋令蠧其心灼灼紅鐙花揚州佳麗種主人舊使君當階自培壅憶昔金帶圍花曾兆榮寵歸來老圃中相顧腹一捧層臺秩名品幃幄錦繡張匪徒事富貴花中有姚黃歐嘗記洛俗坡亦懷錢塘花於吾有助醉墨灑天香可翁和吾家青牛君伯仲龍矯矯不似丁令威暫來立華表鬼神護斧斤風霜幾昏曉摩娑左紐文曾見陸為沼徂徠以多賤吾圃斯拔萃逺從他山移清與幽境會樂天才四十栽爾已興慨吾年六十三方期翠成蓋長公有名言不可居無竹僕僕斸蒼苔森森植寒玉聲來書幌清隂入酒杯緑何須更晚食此君聊當肉春風為花魁先路來枝南但憐結成實能酸不能甘世自不可口根在吾何慚年年共雪月華我徑三三蒼官昔多事乃與羣鳥鄰何如在圭塘亦勝居神囷老根已作石霜皮不成鱗不用歎不遇參軍能寫真朝來花斬新莫雨墜紅濕藤蘿助竒觀羅帔層層碧昌黎性苦隘政爾搴蒙羃一笑問秋乎還能誨人奕枯樹影在水浮動如仙槎昨日春意閙今朝雪滿沙榮悴等兒戲老懷無歎嗟作實助殽核明年還看花有木知尚時手植日向榮無忿底用蠲聊用寓野情亭亭矗翠葆毶毶散紅纓青裳勿異字姑以合歡行濃緑千萬枝火齊中貫穿山人晝眠起銀海日俱眩燥笏行可濡寒裂紋玳絢無賦繼殷元虗塵翰林院曉涼振弱體月墮東方晞香塗漢宫額潤展華陽衣應朝通明殿金杯承露歸道妝豈豫媚池影動清暉司花琢清貞不揥幽人髻蕞爾草堂隂香軋百畝蕙月露映氷壺美芳積磑磑著我沉水鄉庭前更叢桂披披青羅扇敷隂圭塘阿夏忩雲影厚秋枕雨聲多翰墨聊復爾風霜其若何休教近湖石掩映美人歌異卉非卵生緌纓殆天就驚風振細葉宛若三市鬬赤幘不煩憎縛賣孰爾購因之記昔年聽聲趨待漏雨後叢甲生俄成尋丈樹誰名雁過紅綵纈無不具環池爛雲錦吾圃闕爾富呼酒亟賞之秋光欲寒露花仙何許來嫣然立沼上香霧羃曉妝濛濛九華帳勿令苦幽獨就賞時䇿杖秉燭夜莫歸春去無羈鞅蜜脾搗薝蔔成此佛靣胎黃中色可尚况在雪裏開盜名匪獨我伏神出芋魁幸無鼎調實聊用侑山杯園丁功力深春榮到由枿花開月更明溶溶白雲遏紫實待含津囊承躬采掇莫羡鄴侯燒且浣長卿渴人生念慈親堂階多樹萱忽隨靈椿化冥漠俱髙鶱此憂詎可忘肝摧不能言對花聊自慰白頭還抱孫昔人避秦亂川源多種桃我幸遇明世栽培胡自勞看花食其實為圃豈不遭疏懶強鞭䇿猶勝宅不毛清夜遊西園皚皚白雲堆東風苦愛惜不遣過墻來何須領張徹且復傾我罍兹焉不省録寧免長姬咍人間隱逸花開發宜遲莫三徑連松隂百繞穿葛履秋容淡籬落寒香入毫素掇英泛濁醪盆甌親挹注作甘最夏果其奈招衆禽禽啄吾不惜曷酬僦地金呼童日驅護青紅猶滿林禽飽人亦飽於焉獲我心造物眷花王擇后降嘉種英華得既多加以人力壅楚楚御衣黃遂冠羣芳寵羣芳各有匹勿用矉而捧開元得四本花本兹焉張衆色各有熊世獨推其黃我非富貴者胡為植圭塘天教風露夜受用一庭香楨和雙檜立不倚是謂強哉矯栽培嵗月深挺出風塵表正氣凌太虗老翠宜清曉亳宫今何如且復安此沼竹樹滿池臺松乎拔其萃根共土相安心與景俱會撫之足盤桓秦封成一慨相報爾何速袢暑不張蓋生平癖好幽所至必求竹特開數畝田種此萬竿玉篩月清影碎出墻新梢緑嵗晚淡相看何妨食無肉圭塘富春意盎若庾嶺南䇿杖時一觀忍凍吾所甘自是百花魁豈但桃李慚夜來雪有月照見花兩三池上有兩柏風煙為四鄰出根堅似石挺質圓如囷鸞鳳方託宿蛟龍未脫鱗材大為用難何如任吾真擇勝植佳木池邊地宜濕化作萬庭花先看一庭碧春風播馨香曉霧為蒙羃休羡千戶侯富貴劇如奕仙家杳何許欲訪無靈槎春風知鼎竈滿樹出朱砂明朝成白雪幻化益可嗟一笑勿多語孔壇萬年花舍前植竒樹不日見滋榮合歡且合昏有色復有情晴煙蔭幢節輕風揚緌纓莫飾黃金勒幽人方獨行愛此安石榴翠樾受紅穿照眼眼欲迷爛若火雲眩簪擬宫鬢然裁入舞裙絢時見子初成蒼苔滿深院園中有黃葵含露待日晞玉人宿酲起淡妝宜道衣戲把琉黃杯西風醉忘歸檀心不自掩盡展向晴暉素娥宴仙家醉歸鬆寶髻遺簪孕作花清芬不讓蕙夜涼小忩隂回風轉香磑相伴何人斯古香有老桂芭蕉我所愛移植庭之阿緑章封事少羅扇清涼多秋忩一夜雨繁響如愁何明朝就葉上寫我短長歌有卉如雄雞赤玉巧琢就不聞長鳴聲對立若期鬬衆葉方離披千金不可購報曉弗用爾髙眠謝更漏腸胃喜藜莧培植乃成樹紅紫葉為花青黃天闕具矮籬秋意深小園晚景富鴻雁殊未來西風送清露我愛花中仙時時到池上風破胭脂粒煙作雲母帳睡足曉光遲幽人方倚杖何用遊西川吾園堪掉鞅銅切黃金塗中色為胚胎不用較名實俱是東君開幸厠丈人行敢作羣芳魁何妨對磬口時復傾金杯微雨濕鉛華芳妍滿槎枿東闌昨夜風飛雪不容遏小圃未闌珊佳實行可掇人生幾清明一醉忘飢渴人生有所寓北堂惟萟萱翠莛裊鵠觜丹葩驚鳳鶱芳潔擬蘭蕙忘憂復何言宜男更有驗常伴竹生孫武陵不可到吾圃自宜桃作實可立待區區匪徒勞蒸露紅縹眇流水紅周遭便須酩酊醉萬事輕鴻毛晴雲映穠李萬事繁如堆葦綃暖日透縞袂香風來搖落亦可人紛飛入尊罍肝膽醉不邪恐為玉川咍種菊滿東籬徘徊風景莫采之不盈握草露濕芒履無酒只餐英安分行吾素懷哉斜川人停雲目空注嘉果味何甘得名因致禽美質瑩如玉朱砂點黃金芳譽留晉帖作貢稱文林青李勿相違作詩戒遐心當階種芍藥美麗非一種紅紫鬬嬌艷風雨勞蔽壅甘作春光殿乃專衆芳寵對花當若何金鍾日須捧花王元富貴造物更鋪張列檻紅間白擅場紫配黃吾園足花品獨爾張林塘今日好風色滿天吹暖香池亭苦雨松竹皆黃書事有孚驚見黃萎及七松徑傍竹亦不能叢怨咨固是小民罪位育誰虧大造功濕氣連天雲易雨秋聲撼地日恆風圭塘草木渾間事可惜郊原禾黍空一作挽回生意須開霽晚節冥冥藉太空可翁和誰教淫雨害吾松更偃忩前竹幾叢晚景盤桓方取友經年培植已成功堅貞未許移天性光霽行將藉曉風珍重嵗寒心事在却憑孤月照霜空楨和點綴池塘藉竹松松方挺挺竹叢叢上天何事連朝雨老圃都淪一嵗功生意此時須曉日秋聲何處又西風嵗寒節操誰能易三徑佇看青滿空圭塘草木續詠六首并序楨從父都司先生記圭塘草木詩草四首句精意足體正法嚴楨也僭和嚴押具藁既進而竊有疑焉夫仁人君子之於物雖小大不同所以與進造就之心則一圭塘草木皆先生培植之功草木之獲至圭塘亦皆先生進拔之力也然有不得在吟詠之列者豈非以圭塘唱和嘗及之耶抑亦有所遺忘耶梅也松也竹也栁也荷也嘗及之矣而梅松與竹今兹又蒙專詩栁與荷不與焉况若槐之植德桑之濟世椿之靈夀榆之適用而皆棄之六者有知將有憾也謹續為六詩共前為三十詠僭和之罪伏干寬恕教誨斤正又有望焉昔人植三槐百世猶青青所貴德充符豈但隂滿庭黃花兆舉子厚蔭生公卿不見王祐家坡仙有堂銘有地悉栽桑豈但樹墻下修條蔽麥隴緑葉茂長夏欲作成都謀敢比齊魯野老人無贏餘衣白樂鄉社我觀木有椿何異人而仁仁者必有夀此木宜千春栽培幸成趣佳兆在主人主人信不俗植桂為之鄰我山隰有榆移植圭塘上歷歷近仙家夾道起尋丈春火生青煙晚景尤可尚莢也雖無才不似楊花蕩此栁何風流栽插遍庭院才抽緑玉條便散黃金線弱體不勝鶯纎腰似飛燕心事如淵明但比五株羡引泉瀦為沼種藕才一年紅妝映翠蓋水晶宫裏仙凌波踏明鏡捧擁來三千應同娛野逸莫教間酒船翁用楨韻涼颷動空碧修枝振髙青張幄却炎暉交隂可中庭不煩位三公政爾宜冷卿南柯莫記夢陋室方為銘幽人非浮屠日日戲桑下愛其濟世餘重緑芘朱夏昔賢事遊觀竹木萃緑野繼踵吾不能但入老農社靈木享遐算異質稟至仁後先八千嵗才是秋與春蒙莊發揮後塵世閲幾人吾材實樗也賴得爾相鄰託根鄉社間逺迹關塞上春莢羮萬錢大勝食方丈東隅何失之收之敢髙尚嵗晚淡相看萍蓬謝飄蕩依依裊長條漠漠迷小院縈風輕作綿穿露巧如線不復管别離招鶯更留燕會看成車蓋吾圃有餘羡華部愛君子移栽未逾年生意自鬯達主人豈花仙初日爛雲錦靡漫知幾千逺觀敢褻玩栁隂維小船叔和楨韻髙槐殊可愛密葉屯雲青閲市遊胄館過位揚王庭秋風遄作花植德資墨卿得意十二街斯語心當銘樹桑五畝中畦流繞其下逺揚看深春沃若羡初夏願言敦本心毋使質勝野朂哉王道成雞豚樂吾社圭塘挺嘉植雨露涵深仁一株尚未老八千有餘春陋彼擁腫樗娛我逍遙人託根况得地寶樹為芳鄰晚年樂枌榆好景更池上夾道不成籬清隂邇函丈改火嵗所資食皮何可尚勿逐春風顛青錢給遊蕩春從何方來緑我楊栁院東風巧亦甚搓條盡成線願學柴桑翁幽居樂間燕飛絮任為萍樊圃折其羡愛蓮比君子鑿池憶當年風月夜光霽靜對凌波仙亭亭葉無數粲粲花幾千花嬌葉可製寧詫藕如船憶梅十二月四日風雪大作時在陵州有孚為憶圭塘四樹梅不知别後幾枝開狂風惡雪忽如此嫩蕊疏花其殆哉青女未能將暖至翠禽端為問安來歸期咫尺春光好慰藉氷肌有玉杯可翁和孤髙貞徑愛江梅嵗嵗凌寒雪裏開疏影在忩雖偶爾暗香來座本竒哉西園老子巡簷去東閣佳人覔句來莫聽髙樓風外笛且教檀板侑金杯楨和河北髙寒少見梅年年吾圃有花開深紅淡白非偶爾對飲狂歌亦快哉京國故人成夢想鄉關驛使寄書來嵗寒氷雪相看處却似同持瑪瑙杯不寐有懷圭塘明日遂行初九夜有孚幾夜陵州枕圭塘入夢思凍消梅早放春近栁先知涉世元無䇿還家賴有詩促僮勤秣馬詰旦是歸期可翁和去我才旬日渾如久别思劣兄恆在念難弟亦還知且飲團欒酒徐觀跋涉詩梅邊松竹茂好共嵗寒期楨和極目鄉關逺臨風有所思莫疑歸太晚祗恐負相知縮地思竒術懷賢和舊詩石鯨流水處餘響付鍾期十二月草又二日觀雪泠然臺城郭山川四顧清爽小兒誦東坡先生聚星堂詩甚習殊可樂也因憶馬明初云往嵗德常杜左司嘗與諸公和之成巨軸然皆不及一見僕則不敢言和但對景成興謹用其韻爾僭越之罪觀者恕之有孚花飛六出亂無葉泠然臺上偏宜雪茫茫大地迥無塵渺渺豫懷正竒絶山容喜從天際改竹聲時聽池邊折相知更有灞陵翁長途不信人蹤滅平原飢兔巧跧藏空濶蒼鷹飽飛掣小兒忍冷從吾觀楚楚毳裘蒙采纈坡詩誦得聚星堂字字珠璣飛玉屑懷賢撫景慷慨生嵗月堪憐去如瞥豐年但願太史書故事須從汝南説歸來舉似宋廣平却笑梅花心似鐵時梅皆凍損可翁和松花仙釀香浮葉卯君醉詠泠然雪停杯撫景誦其詩韻與天花兩髙絶移床坐對西湖仙撚吟不覺氷鬚折恍疑身在瀛海中得句驚寒塵坌滅懷賢未免失自量襪線長鯨溟渤掣天孫絢爛雲錦裳小點難儕江表纈呼童掃付石鼎融調我療飢雲母屑憑髙凝睇縱遐觀正爾龍公自飄瞥當時後學俱云亡左司巨軸知何説效顰自笑亦續貂始信心腸非石鐵楨和朔風捲地飛雲葉山川一夕埋深雪泠然臺上望眼迷大地茫茫正愁絶西崦深藏茅屋低髙崖寒壓松枝折雲間日腳漏光垂沙尾山腰互明滅蓑笠漁翁獨釣歸村館青旗風颭掣一段清竒畫不成衰顔得酒紅如纈書忩忍凍拾枯薪庭除泥濘陳木屑樹杪飢鴉晚羣噪平田脫兔時一瞥豐年有兆喜欲顛模寫成詩費謄説呼童沽酒當一醉巨筆如椽鋒似鐡圭塘補和并序馬熙欵乃既歌之明年熙如京師可行洎楨日侍安陽公觴詠圭塘更唱迭和詩辭凡二百四十有九又明年楨來京師熙始得伏讀全集大篇雲行短章泉流無非樂日用之常而憂國憂民之實亦未嘗不默寓其間也楨聞詩趨庭日有新益而熙乃以抗塵走俗不得與於斯文愧可勝言耶然可行序引有張本同聲之説固欲援之入社今雖末至未必峻拒之也於是忘其蕪陋勉強補和得詩七十八詞八録次左方惟二先生進而教之水生天一本微陽樂以充陽落此塘伐鼓三聲泉破甕和鈴萬舌發央央作樂導水省事山翁許鶴隨燕鶯奔命為誰疲情知欵乃多幽事不付樵青付雪兒攜妓落成出谷遷喬早致身友生求舊復求新不因萬樹黃金縷肯向園亭漏泄春栁下聞鶯簉羽曾聞雜衰裳圭塘今見雪凝妝詩家物色無逾爾身與虗舟已兩忘舟中對鷺輕柔圓淺勝琉璃珍重山人有當巵若刺玉簪成象鼻翠濤雖滿不淋漓荷觴酌酒少公飲量過三蕉詩思如抽岱嶽毫百摺翠雲題欲遍獨留心葉待秋髙蕉葉題詩凌波萬緑可吾牀水國風來體亦香焚製裂衣殊未暇從教鄉原笑踽涼荷淨納涼洞房編藥屋編荷八面玲瓏得月多誰遣天飄籋雲過嫩涼扶我入無何開忩看雨露髮雲花落繡茵一竿聊復坐忘真大夫亦記當年事風雨中宵念潁濵松隂獨釣卭友相須欲鼓橈那堪舟子亦招招喚回十載江湖夢雲際參差起鳳簫與客泛舟甕牗儀刑盡翠巖自移一榻對晴嵐山中雲出乾坤雨恐有賢書到水南日夕觀山偶然隨栁涉飛橋淡本無心與泊遭落日蒼煙橫白鳥西山秋色兩相髙西隄晚眺移花嘗築避風臺移竹應難就日栽此夕相邀愧泥濘明朝冒雪試重來雨中移竹雪後西園路踏沙一枝曽挂酒壺斜只今午夜扶疏影却屬山中道士家月下觀梅洋洋圉圉校人知慚愧公孫獨受欺老子臨淵非羡汝謂豫不信質之詩倚檻觀魚芳叢種與老仙看春葉秋花不用餐但使幽香入池水年年初度酌甘寒繞堤種菊龍孫戢戢亂穿苔道古端由剪伐開不向此中常徑造欵門無處可裴回竹間開徑琴忘流水水忘琴琴水俱忘是我心甚欲囊琴窒流水栁隂趺坐聽希音水口聽琴競物無心每負壺壺能負我亦堪娛偶然中爾成驍箭絶似檀溪躍的盧獨坐投壺疇隴從衡草樹低西山東郭共冥迷若論攬盡源頭水合姓洹溪作許溪登臺縱目水鄉紅紫盡輿臺獨爾懷氷犯日開羣玉有詩無乃戲卷雲須辦雪千堆調白蓮始花欲攬騷鄉木末蓮繞池分種待秋妍都緣錯把東風怨花似寒灰不復然調木芙蓉不花竒章三品藐巍巍艮嶽將軍視賜緋何似野棲娛退傅苔為冠履草為衣調湖石春纎無力發絃輕助以半天風雨聲詩客凌雲渾未覺六經心醉有餘醒聽筝可翁酒間口號塘肖圭乎圭肖塘幾人勇退水雲鄉韓優白劣都休較凜凛清風不可忘楨侍飲圭塘相下耆英繼洛陽詩如趙璧責秦償二難獨擅文章氣一字不隨時世妝洗雨芰荷方出色充庭芝樹亦生香黃塵烏帽豫多愧不共尊前此夕涼可翁太常引四首園池多在魏公時盛極自然稀天遣可翁回要扶起臺傾榭欹圭塘如此藕花無數一笑領翁詩帝里不須期怕鞾似三司靣皮園中風物水中亭消得兩娉婷濁酒卷荷傾早洗盡筝聲笛聲四隄晴栁一天花氣付與晚山青飛絮挾雲輕任膝上瑶琴自橫稚紅酣日照修筠光景一時新萬扇却遊塵看出浴溫泉太真榜中龍虎班頭鵷鷺無復困冠巾花亦識天民問身到黃扉幾人露桃雲杏不勝穠合讓水花紅别種出林東為氷雪相看改容洹堂雙甕此時千葉愁絶閟珠宫貯酒待吟翁念疇昔時來一中可翁圭塘獨坐四首投老歸歟屢有年西南况復罷籌邊且容獨樂著司馬何必五湖追計然激濁揚清勤泄井任輕求重懶藝田悠悠此意誰能會唱入漁家傲四篇近日征商法不廛謀生徑欲買村煙有錢得酒亦種秫無錦可裳仍集蓮和露任誇桃樹閙因風不禁栁花顛漫郎心事歌能寫樂句從知在此舷園池多勝事有間即逍遙祛暑衣蒙葛揮塵扇却蕉波光搖屋角樹影轉廊腰何事西忩外青山不受招水濶憐亭小隄回覺路長煙霞鄰道院花木勝禪房漢狗烹韓信秦雞脫孟嘗客來如語此未免涴吾塘可翁漫書紫闥三年夢圭塘萬古心卓亭仍就日塞向欲排隂世路茫茫濶天機衮衮深倡酬詩百卷誰遣到雞林可翁有舟勿謂吾舟小輕於太乙蓮能容茶煮竈更載酒如川有分投間散無心咎蹇連若教仍濟險須問水中天可翁大雨兩晝夜僮報墻仆而竹茂床床屋漏苦無乾一夜周垣被水漫生意盡歸叢竹底涉園須待日三竿可翁雨後觀竹有堙墊摧折者雨前栽爾地猶乾急雨排墻爾遽漫愧爾蒼黃類夷甫未能忍死待雞竿可翁新秋即事秋聲無適莫一夜入松關不待歌商頌先期賦小山間情憑緑綺機事失黃間望斷雲林鶴馳書久未還可翁秋隂螢飛猶惡濕鵲噪未聞乾栽竹心逾逺澆桃興已闌有坊鄰履道無路達長安欲和陽春曲詞華愧二難可翁漁家傲四首香霧空濛煙縹眇青歸林木先從杪若采芳洲蘩采沼花事悄幽情聊復忘魚鳥鳥倦知還亭月老魚安淺碧吹斜照魚若有言求直釣秦吉了也應能唱漁家傲八十鄰翁頭似葆為言環翠埋荒草不似圭塘風物閙清晝好來逰往往逢郊島細浪粼粼風嫋嫋栁絲柔直荷錢小鳬短鶴長無用較舟可棹扣舷重和漁家傲涼入槐隂門巷杳秋容次第歸蘋蓼潦盡波寒亭影倒征雁早一聲喚起江天曉菊外白衣殊未到沙堤留得西山眺何事木蓮花獨少詩與調倚風仍度漁家傲池上水枯垠岸峭池邊雪霽無行道三島遙遙心欲造舟子誚拏舟恐受堅氷笑遵渚一鴻方矯矯告飢雙鶴從形稿吾亦安能充爾操惟善寶嵗寒歌徹漁家傲可行瑞蓮歌休官林下堂名洹觀魚今又師鄉賢軒前未暇植他物清漪萬頃花開蓮凌波仙子弓袖濕御風毛女雲鬟鬈就中一朵特獻瑞蕊岐蒂並房仍連里人傳繪筆幾秃羣宦趨慶門應闐三陳秉軸昔接踵二宋射䇿嘗同年當時豈無草木祥水花未必曾司權平輿施厚報未食相臺雙桂宜光前嵗寒徑節各挺挺傳家經笥均便便伯兮勳業在廟社用藏功斂安受廛季才本是棟梁具胡不領袖梲與椽登庸便合踵舊轍天公有語令花傳洹堂嘉貺又繼出慶源衮衮逾淵泉階庭連理見玉樹合歡不但瓜綿綿嗟豫病減詩復病探囊試藥猶未痊誦公新句弗克和飽觀紅日酣平川可行對景書懷池上塤篪協四通毋勞鍾木互撞攻詩生流水行雲外人在光風霽月中路到迂時因避竹垣從垝處更培松世間何地無魚飯此日委蛇勝自公可行睡起偶成園池擇勝似江鄉蕉鹿何妨爾汝忘不是扣舷歌欵乃更從仙枕覔山房雲入茶甌自在行風生竹牖更多情石渠近日添新雨膝上橫琴聽水聲可行即事載書逾十乘儲醬乏千缸竹影明窺户荷香晚度忩對山方目擊見客又心降落日層臺表蒼煙白鳥雙可行雨後督修堰歸坐嘉蓮亭謝政從翁懶持家有弟勤鑿池通活水築島駐行雲栁外渠穿石荷邊路迫濆亭臺全尚象花竹間成文月畢秋仍早星虗氣未殷霖淫寧有節洚洞遂無垠畫舫齋居士黃樓賦卯君水平池見岸雨歇日窮曛竹墊芽新濯魚飛尾舊焚計庸書載具犒役酒仍醺境順多逢坎時艱好䇿勳一勞知永逸萬事付無聞折簡常招客裁詩足張軍樹容黃鳥並屋讓白雲分人樂宜居獨天謀欲渙羣明朝又興作菊徑荷鋤藝可行鄉友具宴石溜穿渠㶁㶁鳴眼中幽事總關情故人載酒不辭醉好鳥隔花空有聲但使軒扉常欵客不妨松菊屢尋盟西風瘦馬長安路説與山靈笑絶纓可行侍兄赴圭塘年來夢斷鳳池坊雲影天光有此塘夜飲不辭歸路逺晨興更覺攬衣忙桑麻莽蒼接平野機杼咿啞聞隔墻忽有好詩生馬上眼明雙檜拂雲長可行宴罷泛舟三十韻仙舟夫何如快逸且奔放蒲帆濯沆瀣桂棹却氛坱西塞辭玄真甫里謝魯望秋雲與飛揚春波恣摩蕩濟人功已斂橫渡職非曠願陪山翁遊况值新雨漲荷深知渚濶花虗見雲傍鄉閭速佳賔渤海致名釀影搖雙檜舞聲發半天唱栁鶯續紆餘松鶴助翓􅀈滔滔劇川吸湛湛豁陂量光迎東月皎氣挹西皓碭聯句交彌月請序接文暢吾將出方外彼亦可舟上空虛名共逃俯仰物無長猶存一釣竿欲破萬里浪霆轟彭蠡澤風擊黃天蕩又虞險難乘或致身弗亢不如謝蒙衝聊復娛此舫旅酬賔主席各逮子姪行全交忠罔竭尋盟信可杖使乎杯勺免翁以雞黍餉神龍豈容豢天驥俄脫鞅醒醉既兩忘寵辱亦俱喪茫茫迹大禹表表州古相休逸猶可追觀魚已堪悵更長幕無烏月黑草有恙孤蓬憩雙槳一夢絶諸妄明當泝滄浪髙歌航漢漾仍究圭塘源乘槎洹水訪可行偕故人陪兄泛舟紅衣落盡渚蓮收容得虛舟日夜浮二客從豫非漫與一尊邀子助清遊偶然憩息來三嶼從此翺翔到十洲欲賦棹歌成慷慨淡雲疏雨不勝秋可行登泠然臺觀山林慮山本竒臺上觀更好宛如武庫開事此軍實討千矛插層空萬戟立荒草弓戈紛委地盾劍光夾道端能愁城攻亦可詩陳掃佳人淡相對綸巾照雲縞緬懷湘水湄衡嶽配朱鳥惜無泠然風筆闕祝融小可行記塘上草木草四首亭前雙檜立枝曲能自矯譬如直諫臣抗論犯天表氣含芝术春節礪氷雪曉丹井有餘波挹彼注兹沼嵗寒撫青松觀此物情萃不有蛟龍形孰當風雲會寧隨陶徑菊日以荒自慨不願汙秦封為作擎雨蓋移家傍洹溪辛苦嘗為竹植之永為好寸土如寸玉逝從篔簹偃化作渭川緑中有鳳笛材清音勝絲肉昔年探梅花攜酒過水南今兹對池上嗅香當清甘楚騷雖見遺吾林亦何慚但恐和鼐晚頃筐實餘三柏夀以世計當與太初鄰銅柯既盤盤黛葉仍囷囷雄姿挾龍虎竒文間纎鱗嵗晚同闕操甚知丈人真河濟富千樹性本樂卑濕釣磯有餘地借爾油幢碧繁霜剝其隂忽若尊舉羃致身安樂窩猶能大觀奕杏園千樹春年年送仙槎如遇黃扉人飛雪漫隄沙移根文兹土開晚慎勿嗟但願世其文常觀曲江花有木枝葉繁葳㽔蔽前榮作止每因風離合非其情名器不可假假爾一就纓為爾解蠲忿示我亦周行若榴屯於春入夏氣乃穿花能醒醉眼實可清瞑眩點紅亦何心要作濃緑絢但為宜男房煌煌照庭院黃葵本髙潔值此湛露晞峩峩切雲冠飄飄六銖衣中色足自媚吾將田園歸佳人殊未來忘言對斜暉遙憐章甫冠贈玉簪我髻終當衣製荷未可帳空蕙茉莉如搔頭配爾香磑磑胡不來中州而乃宅八桂甘蕉本靈苖斸根出崇阿狂僧萬猶少道士一已多中霄聽風雨詩富葉如何茫茫夢中鹿倚忩聊寤歌秋花矗雞幘纓武凡幾就蹙錦豈欲鳴碎丹或能鬬新詩繼歐梅已受賈人購謇豫乏雄辭雌伏愧屋漏吳興萟白莧欲以清自樹此種備五色充庭當家具葉披錦雲亂實粲玄珠富霜隕不足惜明年有春露銜子定黃鵠孰謂來海上紫綿飛莫簾纈暈點春帳照妝待銀燭追香負笻杖明當走昌州爾勿斷豫鞅春風何許來孕此黃玉胎蜜脾不自闕磬口何由開以貌可梅僕論香亦花魁風味極不淺吾當舉深杯天公琢瓊瑤一夜綴萌蘖遂令東闌雪不受薄寒遏淡妝何用洗落英猶可掇安得釘坐人相與浣塵渴主婦治北堂所植惟貴萱抗葉驚四垂擢英喜孤騫嵇合敘其功無乃成巵言當持忘憂訓問我叔重孫何彼穠穠花浩歌園有桃陽和不擇地人力寧施勞舊植各天涯或又玄都遭惟爾足佳實羞之配溪毛園林淡泊春有此氷雪堆赤日照未好月夜須重來逝將濯其根致之洗與罍顔色勿慘慘恐為梨所咍秋容為誰妍白衣來何莫不惜尊中酒恐負籬下履霜風掃頳紫星月照黃素采采晚節香美人意方注花髙枝滿蝶實老田有禽風日不貸春吾囊已無金誰將闕訛豕致爾來為林不有右軍帖疇能沃吾心嘗徴廣陵花腰金本無種其當異人出嘉瑞不可壅西園有分根新雨荷天寵願披家慶圖觴為吟伯捧知花在根橃培養異弛張媒暖置叢棘穴蠧簪硫黃主人本無心聊復雲影塘端誦康節語輔車有餘香可行松竹皆黃淫雨為災及稚松黃萎又見竹身叢徒能醫俗不自療謂可引年寧有功外直尚持君子節後凋終繼烈臣風人將大任多窮困其孰知之惟太空楨圭塘草木續詠六首面槐餘十年老眼冷復青萌蘖迸春雨一一碩且庭平生邁種德不但保彥卿我將茹其花髙誦休哉銘國禮嚴公桑蓋以勤率下采采為蠶供衣被溥夷夏何年樹獨樂花竹共秀野當令有餘帛足辦里中社惟木首五行實配四端仁椿又木之首配時為孟春春當嵗八千此語聞蒙人仁者必有夀老境願卜鄰仙家榆尚白歷歷種天上此地敏其青豪末起十丈蕪荑抱美材胡為食弗尚戢戢風雨栽生意尤浩蕩杖履迷栁邊無乃似歸院不如棹孤舟沿隄纜其線朝絮粘露蜂夕條棲雨燕與物同至和天恩殊曼羡鑿池得枯荷斂迹不記年一朝出淤泥亭亭水宫仙遙憐構巢龜欲問嵗幾千便當從太一暫借紅葉船圭塘欵乃集卷下
