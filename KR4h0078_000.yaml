body:
  text: 圭塘欵乃集總集類提要臣等謹案圭塘欵乃集二卷元許有壬及其弟有孚子楨倡和之詩也有壬至正集及圭塘小稿已別著録至正八年有壬既致仕歸乃以賜金得康氏廢園于相城之西鑿池其中形如桓圭因以圭塘為名日攜賔客子弟觴咏其間積成巨帙名之曰圭塘欵乃集共詩二百一十九首樂府六十六首中惟樂府十解為其客馬熙所作餘皆有壬有孚及楨之作既而楨如京師以其本示馬熙熙復取而盡和之凡詩七十八首詞八首別題曰圭塘補和附之于後其詩雖多一時適興之什不必盡刻意求工而一門之中父子兄弟自相師友其風流文雅之盛猶有可以想見者焉集前有周伯琦序後有段天祐等八跋及趙恆陸煥然題詩各一首皆署至正庚寅辛卯甲辰丙午諸年惟末有洹濵一跋不著名字稱此集江湖友人躬録裝潢者二十八年南歸展讀外皆破碎兵後所存惟此本乃力疾補葺遺我子孫云云後題上章涒灘四月案上章涒灘為庚申嵗實明洪武之十三年而丁文升跋內亦有從洹濱御史領歸抄録語蓋洹濵乃有孚別號而所謂江湖友人者即文升也乾隆四十三年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀圭塘欵乃集原序圭塘欵乃者御史中丞安陽許公與其季氏都司君可行其客馬君明初及公之冢嗣國子上舍生楨間居倡和之什也公謝事歸相城於其第之西二里得康氏廢園剃灌莽剗椔翳廓然一新既又鑿池其中袤廣以步計者千餘深八尺形如桓圭雙洲右枕孤島左峙夷堤緣焉回垣繚焉導渠西北時其泄閼直坤有崇臺西山在肘腋間繕完舊亭勝槩方獻道在其南梁于道之半池清見底魚潑刺可數於是泛池有舟涉川有橋芙蕖楊栁棗栗桑榆梅榴桃杏蒼松翠竹繁花豐草周於池之中外蓋培植踰年而後成燠涼炎凍雖異候而生意源源娛目暢懷無時或間惟二古檜巋然乃康氏故物公既甚愛之時杖履攜弟若子會賓友觴咏其間以池之占勝居多故以圭塘名而此唱彼和宫商遞宣少長同歡主賔相忘一草一木品題不遺故名其篇集曰欵乃若漁歌互答然亦謙辭也都司君遂自為引裒為巨帙或傳至京師伯琦得而盡閲之詩古律五七言二百一十九樂府六十六總之二百八十有五其中惟樂府十解馬明初所作餘皆公與弟若子一家所作也嘻何其盛哉惟賢人君子有濟世之偉業者必有絶世之高致蓋識見預定於胸中行藏一安於所遇藴之豐則發之宏發之宏則藴之者益豐矣古昔遊賞之迹若東山若緑野若平泉若輞川龍門其境未嘗不勝也或時有未偶或志有未遂或地非其鄉至於子弟之才美皆不見稱於世眉山蘇氏一門詞藻盛矣然用世未竟間關嶺海莫年來歸各謀僑居未聞有燕集遊覽之樂由是觀之功名之際家庭之間有不得兼其美者多矣獨安陽公以命世之賢際熙洽之運自處士時已負重望及居宰輔慨然以天下為已任迪德明謨培元氣植善類正色立朝將三十年天下隂受其賜而不知也年方耳順角巾東第坐對桑梓泊然韋布園林池亭泉石之勝既甲一方而棣蕚芝蘭之輝映又英發杰出玩造化於品物暢情性於彜倫家傳户誦如獲親炙天下之美昔人之所未得者遂兼有之然非受於天者厚固不能以具諸美非造於道者深亦不能以一朝享也孔子曰精義入神以致用也利用安身以崇德也用被於人德尊於已樂行憂違無施不可非義精仁熟如吾安陽公者不足以與於此伯琦從公遊非一日辱知最深故於圭塘之詠推本而言之使知公者求公於樂山樂水之間而不可與流連光景忘世徇情者論也謹書於欵乃篇什之端以見安陽公一門文物之盛至正十年嵗在庚寅七月既望鄱陽周伯琦敘
